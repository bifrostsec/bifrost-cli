name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version of new release (ex. 1.2.3)'
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Download dependencies
        run: make deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8

      - name: Run tests
        run: make test

      - name: Build binaries
        run: make GIT_COMMIT=${{ github.sha }} ${{ inputs.version && format('VERSION={0}', inputs.version) || '' }} build-all